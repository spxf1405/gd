syntax = "proto3";

option go_package = "backend/internal/gen/auth/v1;authpb";

package auth.v1;

import "auth/v1/auth.proto";

message AuthWithGoogleRequest {
  string id_token = 1;
}

message AuthWithGoogleResponse {
  string access_token  = 1;
  string refresh_token = 2;
  User   user          = 3;
}

service AuthService {
  rpc LoginWithGoogle(AuthWithGoogleRequest) returns (AuthWithGoogleResponse);
}