syntax = "proto3";

package tournament.v1;

option go_package = "backend/internal/gen/tournament/v1;tournamentpb";

import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";
import "match/v1/match.proto";
import "bracket/v1/bracket.proto";

// Trạng thái giải đấu
enum TournamentStatus {
  TOURNAMENT_STATUS_UNSPECIFIED         = 0;
  TOURNAMENT_STATUS_REGISTERING         = 1;
  TOURNAMENT_STATUS_REGISTRATION_CLOSED = 2;
  TOURNAMENT_STATUS_STARTED             = 3;
  TOURNAMENT_STATUS_RUNNING             = 4;
  TOURNAMENT_STATUS_FINISHED            = 5;
  TOURNAMENT_STATUS_CANCELLED           = 6;
}

message Player {
  string id   = 1;
  string name = 2;
}

enum TournamentType {
  TOURNAMENT_TYPE_SINGLE = 0;
  TOURNAMENT_TYPE_TEAM   = 1;
}

enum TournamentFormat {
  TOURNAMENT_TYPE_8_BALL  = 0;
  TOURNAMENT_TYPE_9_BALL  = 1;
  TOURNAMENT_TYPE_10_BALL = 2;
}

enum Gender {
  MALE              = 0;
  FEMALE            = 1;
  PREFER_NOT_TO_SAY = 2;
}

message PrizeDistribution {
  string id            = 1;
  string tournament_id = 2;
  string name          = 3;
  int32  display_order = 4;
  int32  amount        = 5 ;
}

message Round {
  string                  id      = 1;
  string                  name    = 2;
  repeated match.v1.Match matches = 3;
}

// Thông tin giải đấu
message Tournament {
  string                      id                  = 1;
  string                      name                = 2;
  TournamentType              type                = 3;
  TournamentFormat            format              = 4;
  google.protobuf.StringValue format_description  = 5;
  google.protobuf.StringValue start_date          = 6;
  google.protobuf.StringValue end_date            = 7;
  google.protobuf.StringValue location            = 8;
  google.protobuf.StringValue total_prize         = 10;
  google.protobuf.StringValue entry_fee           = 11;
  google.protobuf.Int32Value  max_players         = 12;
  TournamentStatus            status              = 13;
  google.protobuf.StringValue organizer           = 14;
  string                      created_at          = 15;
  string                      update_at           = 16;
  google.protobuf.StringValue description         = 17;
  int32                       max_age             = 18;
  bool                        has_ranking         = 19;
  google.protobuf.StringValue max_ranking_class   = 20;
  Gender                      gender              = 21;
  repeated Player             registered_players  = 22;
  google.protobuf.StringValue deleted_at          = 23;
  repeated PrizeDistribution  prize_distributions = 24;
  repeated bracket.v1.Bracket brackets            = 25;
}