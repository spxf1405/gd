syntax = "proto3";

package match.v1;

option go_package = "backend/internal/gen/match/v1;matchpb";

import "participant/v1/participant.proto";

message Match {
  string                              id            = 1;
  int32                               display_order = 2;
  int32                               match_index   = 3;
  int32                               round         = 4;
  int32                               total_rounds  = 5;
  string                              side          = 6;
  repeated string                     players       = 7;
  string                              winner        = 8;
  bool                                is_auto_win   = 9;
  bool                                is_skipped    = 10;
  MatchData                           data          = 11;
  Position                            position      = 12;
  string                              round_id      = 13;
  repeated participant.v1.Participant participants  = 14;
}

message MatchData {
  string label = 1;
}

message Position {
  int32 x = 1;
  int32 y = 2;
}